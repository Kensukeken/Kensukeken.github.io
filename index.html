			background-color: #4b3c62;

		nav a {
			color: #fff;

			background-color: #fff;

			position: relative;
			z-index: 0;
		}

		h2 {
			font-size: 36px;
			font-weight: bold;
			margin-top: 40px;
		}

		p {
			font-size: 18px;
			line-height: 1.5;
			margin-top: 20px;
		}

		ul {
			list-style-type: none;
			padding: 0;
			margin: 0;
		}

		li {
			margin-bottom: 10px;
		}

		.math {
			font-size: 36px;
			font-weight: bold;
			color: #fff;
			background-color: #4b3c62;
			padding: 5px 10px;
			border-radius: 10px;
			margin-right: 10px;
		}

		.gif {
			max-width: 100%;
			margin: 20px 0;
			border-radius: 10px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
		}

		.footer {
			background-color: #4b3c62;
			color: #fff;
			padding: 20px;
			text-align: center;
			position: relative;
			z-index: 1;
		}
	</style>
</head>
